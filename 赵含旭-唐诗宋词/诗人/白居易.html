        <h2><img src="../images/白居易.jpg"></h2> 
            <hr width="100%" size="1">
        <h2>钱塘湖春行</h2>
            <p>孤山寺北贾亭西，水面初平云脚低。</p>
            <p>几处早莺争暖树，谁家新燕啄春泥。<p>
            <p>乱花渐欲迷人眼，浅草才能没马蹄。</p>
            <p>最爱湖东行不足，绿杨阴里白沙堤。</p>
   
        
        
        <h2>问刘十九</h2>
            <p>绿蚁新醅酒，红泥小火炉。</p>
            <p>晚来天欲雪，能饮一杯无？</p>
          
      
        <h2>赋得古原草送别</h2>
            <p>离离原上草，一岁一枯荣。</p>
            <p>远芳侵古道，晴翠接荒城。</p>
            <p>又送王孙去，萋萋满别情。</p>
