        <h2>赠汪伦</h2>
        <P>李白乘舟将欲行，忽闻岸上踏歌声。</P>
        <P>桃花潭水深千尺，不及汪伦送我情。</P>
        
        
        <h2>送别得字书</h2>
        <p>水色南天远，舟行若在虚。</p>
        <p>迁人发佳兴，吾子访闲居。</p>
        <p>日落看归鸟，潭澄羡跃鱼。</p>
        <p>圣朝思贾谊，应降紫泥书。</p>
        <h2>早发白帝城</h2>
        <p> 朝辞白帝彩云间，千里江陵一日还。</p>
        <p> 两岸猿声啼不住，轻舟已过万重山。</p>
